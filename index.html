<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b5e20">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Rugby Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="pantallaConfig">
    <div class="headerConfig">
        <h2>Preparar Partido</h2>
        
        <div class="linea">
            <input id="sheetID" placeholder="ID Google Sheet" style="flex: 2;">
            <button onclick="importarJugadoresSheet()" style="flex: 1;">Cargar</button>
        </div>

        <div class="linea-doble">
            <input id="equipo" placeholder="Equipo">
            <input id="rival" placeholder="Rival">
        </div>

        <div class="linea-doble">
            <input id="buscarJugador" placeholder="Buscar..." oninput="filtrarJugadores()">
            <div class="contador-container">
                <span id="contador">0 / </span>
                <input type="number" id="cantidadJugadores" min="1" max="23" value="15">
            </div>
        </div>
    </div>

    <div id="tablaJugadores"></div>

    <div class="linea botones">
        <button id="btnIniciar" onclick="iniciarPartido()" disabled>Iniciar</button>
        <button onclick="exportarEventos()">Exportar</button>
        <button onclick="borrarSeleccion()">Borrar</button>
        <button onclick="mostrarEstadisticas()">📊 Datos</button>
    </div>
</div>

<div id="pantallaPartido" style="display:none">
    <div class="headerPartido">
        <div id="cronometro">00:00</div>
        <div id="puntosPropio">0</div>
        <div id="infoPartido" class="equipos">Equipo vs Rival</div>
        <div id="puntosRival">0</div>
        <div id="amarillas"></div>
    </div>

    <div class="barraControles">
        <button id="btnCrono" onclick="iniciarCrono()">Iniciar</button>
        <button id="toggleModo" onclick="toggleModo()">Modo</button>
        <button onclick="modoCambios()">Cambios</button>
        <button onclick="mostrarEstadisticas()">Datos</button> 
        <button onclick="finalizarPartido()">Finalizar</button>
    </div>

    <div class="zonaJuego">
        <div id="jugadores" class="grid"></div>

            <div class="barra-tanteador">
            <button class="btn-rival" onclick="sumarPuntoRival('try')">🏉 Try Rival</   button>
            <button class="btn-rival" onclick="sumarPuntoRival('conversion')">⚡ Conv   Rival</button>
            <button class="btn-rival" onclick="sumarPuntoRival('drop')">🎯 Drop     Rival</button>
            <button class="btn-deshacer" onclick="deshacerUltimaAccion()">↩️     Deshacer</button>
        </div>

        <h3>Acciones</h3>
        <div id="acciones" class="grid"></div>
    </div>

    <div id="ultima">Sin eventos</div>
</div>

<div id="pantallaEstadisticas" style="display:none">
    <div class="headerStats">
        <h2>Estadísticas</h2>
        <div class="stats-tabs">
            <button class="tab-active" onclick="cambiarTabStats('actual')">Actual</button>
            <button onclick="cambiarTabStats('historial')">Historial</button>
            <button onclick="cambiarTabStats('jugadores')">Jugadores</button>
            <button class="btn-volver" onclick="volverDeEstadisticas()">← Volver</button>
        </div>
        
    </div>
    
    <div id="statsActual" class="stats-contenido">
        <!-- Contenido dinámico -->
    </div>
    
    <div id="statsHistorial" class="stats-contenido" style="display:none">
        <!-- Contenido dinámico -->
    </div>
    
    <div id="statsJugadores" class="stats-contenido" style="display:none">
        <!-- Contenido dinámico -->
    </div>
</div>

<script src="storage.js"></script>
<script src="sheet.js"></script>
<script src="app.js"></script>

</body>
</html>
