<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b5e20">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Rugby Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="pantallaConfig">
    <div class="headerConfig">
        <h2>Preparar Partido</h2>
        
        <div class="linea">
            <input id="sheetID" placeholder="ID Google Sheet" style="flex: 2;">
            <button onclick="importarJugadoresSheet()" style="flex: 1;">Cargar</button>
        </div>

        <div class="linea-doble">
            <input id="equipo" placeholder="Equipo">
            <input id="rival" placeholder="Rival">
        </div>

        <div class="linea-doble">
            <input id="buscarJugador" placeholder="Buscar..." oninput="filtrarJugadores()">
            <span id="contador">0 / 15</span>
        </div>
    </div>

    <div id="tablaJugadores"></div>

    <div class="linea botones">
        <button id="btnIniciar" onclick="iniciarPartido()" disabled>Iniciar</button>
        <button onclick="exportarEventos()">Exportar</button>
        <button onclick="borrarSeleccion()">Borrar</button>
    </div>
</div>

<div id="pantallaPartido" style="display:none">
    <div class="headerPartido">
        <div id="cronometro">00:00</div>
        <div id="infoPartido"></div>
        <div id="amarillas"></div>
    </div>

    <div class="barraControles">
        <button id="btnCrono" onclick="iniciarCrono()">Iniciar</button>
        <button id="toggleModo" onclick="toggleModo()">Modo</button>
        <button onclick="modoCambios()">Cambios</button>
        <button onclick="finalizarPartido()">Finalizar</button>
    </div>

    <div class="zonaJuego">
        <div id="jugadores" class="grid"></div>
        <h3>Acciones</h3>
        <div id="acciones" class="grid"></div>
    </div>

    <div id="ultima">Sin eventos</div>
</div>

<script src="storage.js"></script>
<script src="sheet.js"></script>
<script src="app.js"></script>
</body>
</html>
